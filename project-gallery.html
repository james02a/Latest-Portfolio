<!--
  ============================================================
  PROJECT GALLERY SECTION — standalone, drop-in snippet
  ------------------------------------------------------------
  - Every class is prefixed `pg-` to avoid collisions with your
    existing site CSS.
  - No frameworks. Pure HTML5 + CSS3 + vanilla JS.
  - Paste this block wherever the section should live in your
    page (e.g. between your existing "About" and "Contact"
    sections). Link project-gallery.css in <head> and
    project-gallery.js before </body>.
  ============================================================
-->

<section class="pg-gallery" id="project-gallery" aria-labelledby="pg-heading">
  <div class="pg-container">

    <!-- ===== Top area: eyebrow, heading, description, accent line ===== -->
    <header class="pg-header pg-reveal">
      <p class="pg-eyebrow">Selected Work</p>
      <h2 class="pg-heading" id="pg-heading">Project Gallery</h2>
      <span class="pg-accent-line" aria-hidden="true"></span>
      <p class="pg-description">
        A curated collection of websites I've designed and developed for clients
        across different industries. Browse completed projects, explore their
        designs, and visit the live websites to see the final result.
      </p>
    </header>

    <!-- ===== Middle area: large preview image in glass frame ===== -->
    <div class="pg-preview pg-reveal" style="--pg-delay: 120ms;">
      <div class="pg-preview-frame">
        <img
          class="pg-preview-img"
          src="images/project-gallery-preview.webp"
          alt="Dashboard-style preview of multiple client project thumbnails"
          width="1400"
          height="900"
          loading="lazy"
        />
        <span class="pg-preview-glow" aria-hidden="true"></span>
      </div>
    </div>

    <!-- ===== CTA ===== -->
    <div class="pg-cta-wrap pg-reveal" style="--pg-delay: 220ms;">
      <a href="/projects" class="pg-cta">
        <span class="pg-cta-label">Browse All Projects</span>
        <span class="pg-cta-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </a>
    </div>

  </div>

  <!-- Ambient floating accents, purely decorative -->
  <div class="pg-float pg-float--a" aria-hidden="true"></div>
  <div class="pg-float pg-float--b" aria-hidden="true"></div>
</section>
